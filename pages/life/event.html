<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>이벤트 - DGE Book Life</title>
		<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="/src/css/main.css" />
	</head>
	<body class="page-body">
		<header class="site-header">
			<div class="container header-inner">
				<a href="/" class="site-logo">DGE Book Life</a>
				<nav class="main-nav">
					<div class="nav-item">
						내 손의 책
						<div class="nav-dropdown">
							<a href="/pages/book/campaign.html">캠페인 소개</a>
							<a href="/pages/book/archive-2025.html">2025 아카이브</a>
							<a href="/pages/book/download.html">다운로드 자료</a>
						</div>
					</div>
					<div class="nav-item active">
						내 삶의 힘
						<div class="nav-dropdown">
							<a href="/pages/life/program.html">프로그램</a>
							<a href="/pages/life/event.html">이벤트</a>
							<a href="/pages/life/contest.html">공모전</a>
						</div>
					</div>
					<a class="nav-item" href="/pages/board/index.html">게시판</a>
				</nav>
			</div>
		</header>

		<section style="background: linear-gradient(135deg, #6b46c1, #9333ea); color: white; padding: 80px 0 60px">
			<div class="container" style="text-align: center">
				<h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 12px">이벤트</h1>
				<p style="opacity: 0.9">진행 중인 이벤트에 참여하세요</p>
			</div>
		</section>

		<section class="section-sm">
			<div class="container">
				<div class="gallery-grid" id="events-grid">
					<div style="grid-column: 1/-1; text-align: center"><div class="spinner"></div></div>
				</div>
				<div id="pagination-wrap"></div>
			</div>
		</section>

		<footer class="site-footer">
			<div class="container">
				<div class="footer-bottom"><p>© 2025 DGE Book Life. All rights reserved.</p></div>
			</div>
		</footer>

		<script type="module">
			import { getEvents } from '/src/lib/supabase.js';
			import { formatDate, truncate, renderPagination } from '/src/js/utils.js';

			let currentPage = 1;

			async function load() {
				const grid = document.getElementById('events-grid');
				const { data, count, error } = await getEvents({ page: currentPage, limit: 9 });
				if (error || !data?.length) {
					grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-light);padding:48px">이벤트가 없습니다.</div>';
					return;
				}
				grid.innerHTML = data
					.map(
						e => `
        <div class="card">
          <img class="card-img" src="${e.thumbnail_url || '/placeholder.svg'}" alt="${e.title}" onerror="this.src='/placeholder.svg'" />
          <div class="card-body">
            <span class="badge ${e.is_active ? 'badge-green' : 'badge-gray'}" style="margin-bottom:8px">${e.is_active ? '진행중' : '종료'}</span>
            <div class="card-title">${truncate(e.title, 50)}</div>
            <div class="card-desc">${truncate(e.description, 80)}</div>
            ${e.date_start ? `<div class="card-meta"><span>📅 ${formatDate(e.date_start)} ~ ${formatDate(e.date_end)}</span></div>` : ''}
          </div>
        </div>
      `
					)
					.join('');

				renderPagination('pagination-wrap', {
					current: currentPage,
					total: count,
					perPage: 9,
					onChange: p => {
						currentPage = p;
						load();
					},
				});
			}

			load();
		</script>
	</body>
</html>
